<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversation — Responsive Chat Interface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <button class="drawer-overlay" id="drawerOverlay" aria-hidden="true" tabindex="-1"></button>

  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar" aria-label="Conversation history">
      <div class="sidebar__top">
        <button class="btn-new-chat" id="newChatBtn">
          <span class="btn-new-chat__brand-icon" aria-hidden="true">
            <img src="assets/icons/chat-icon.png" alt="">
          </span>
          New conversation
        </button>
      </div>

      <form class="sidebar__search" role="search">
        <label for="searchChats" class="visually-hidden">Search conversations</label>
        <svg class="search-icon" width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.4" />
          <path d="M11.5 11.5L15 15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
        <input type="search" id="searchChats" placeholder="Search conversations" autocomplete="off">
      </form>

      <nav class="sidebar__history" aria-label="Conversation list">
        <p class="sidebar__section-label">Recent</p>
        <ul class="chat-list" id="chatList"><!-- conversation items injected by sidebar.js --></ul>
      </nav>

      <div class="sidebar__bottom">
        <button class="theme-toggle" id="themeToggle" aria-pressed="false">
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M13.5 9.5A6 6 0 1 1 6.5 2.5 5 5 0 0 0 13.5 9.5Z" stroke="currentColor" stroke-width="1.3"
              stroke-linejoin="round" />
          </svg>
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="8" cy="8" r="3.2" stroke="currentColor" stroke-width="1.3" />
            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.4 1.4M11.6 11.6L13 13M13 3l-1.4 1.4M4.4 11.6L3 13"
              stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
          </svg>
          <span id="themeLabel">Dark mode</span>
        </button>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
      <header class="topbar">
        <button class="icon-btn drawer-toggle" id="drawerToggle" aria-label="Open conversation list"
          aria-expanded="false" aria-controls="sidebar">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
          </svg>
        </button>
        <div class="topbar__brand-icon" aria-hidden="true">
          <img src="assets/icons/chat-icon.png" alt="">
        </div>
        <h1 class="topbar__title" id="activeChatTitle">New conversation</h1>
        <div class="topbar__spacer" aria-hidden="true"></div>
      </header>

      <main class="chat-main" id="chatMain">
        <section class="empty-state" id="emptyState" aria-live="polite">
          <div class="empty-state__mark" aria-hidden="true">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <path d="M6 10a4 4 0 0 1 4-4h20a4 4 0 0 1 4 4v14a4 4 0 0 1-4 4H16l-7 6v-6h-.5A4 4 0 0 1 6 24V10Z"
                stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
            </svg>
          </div>
          <h2>Start a conversation</h2>
          <p>Type a message below to begin. Your conversations are saved to this browser automatically.</p>
        </section>

        <div class="message-list" id="messageList" role="log" aria-live="polite" aria-label="Messages" hidden></div>

        <div class="typing-indicator" id="typingIndicator" hidden aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </main>

      <footer class="composer">
        <form class="composer__form" id="composerForm">
          <label for="messageInput" class="visually-hidden">Message</label>
          <textarea id="messageInput" class="composer__input" placeholder="Send a message…" rows="1"
            maxlength="4000"></textarea>
          <button type="submit" class="composer__send" id="sendBtn" aria-label="Send message" disabled>
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M2 16l14-7L2 2v5.5L11 9l-9 1.5V16Z" fill="currentColor" />
            </svg>
          </button>
        </form>
        <p class="composer__hint">Enter to send · Shift + Enter for a new line</p>
      </footer>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
